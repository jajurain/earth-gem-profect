<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>마음보석으로 지구를 빛내요</title>
  <style>
    :root {
      --bg1: #e8f7ff;
      --bg2: #fff7dd;
      --card: rgba(255, 255, 255, 0.82);
      --text: #244057;
      --accent: #3a8fb7;
      --shadow: 0 12px 30px rgba(33, 82, 99, 0.16);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: linear-gradient(145deg, var(--bg1), #eefce9 45%, var(--bg2));
      color: var(--text);
      overflow-x: hidden;
    }

    .app {
      width: min(1200px, 96vw);
      margin: 0 auto;
      padding: 22px 0 34px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 48px);
      letter-spacing: -1px;
      color: #15536a;
      text-shadow: 0 2px 0 rgba(255,255,255,.75);
    }

    .challenge-box {
      background: var(--card);
      border: 3px solid rgba(255,255,255,.7);
      border-radius: 22px;
      padding: 12px 16px;
      min-width: 250px;
      box-shadow: var(--shadow);
    }

    .challenge-label {
      font-size: 14px;
      font-weight: 800;
      opacity: .72;
      margin-bottom: 4px;
    }

    #challengeTitle {
      font-size: 25px;
      font-weight: 900;
      color: #23749a;
      min-height: 32px;
    }

    .main {
      display: grid;
      grid-template-columns: 1fr 370px;
      gap: 18px;
      align-items: stretch;
    }

    .earth-card, .panel {
      background: var(--card);
      border: 3px solid rgba(255,255,255,.75);
      border-radius: 30px;
      box-shadow: var(--shadow);
    }

    .earth-card {
      position: relative;
      min-height: 620px;
      padding: 22px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      isolation: isolate;
    }

    .score {
      position: absolute;
      top: 22px;
      left: 22px;
      background: #fff;
      border-radius: 24px;
      padding: 12px 18px;
      font-size: 30px;
      font-weight: 1000;
      color: #1f7c99;
      box-shadow: 0 6px 16px rgba(0,0,0,.08);
      z-index: 5;
    }

    .level {
      position: absolute;
      top: 22px;
      right: 22px;
      background: #fff;
      border-radius: 24px;
      padding: 12px 16px;
      font-size: 18px;
      font-weight: 900;
      color: #4d8b3a;
      box-shadow: 0 6px 16px rgba(0,0,0,.08);
      z-index: 5;
    }

    .earth-wrap {
      position: relative;
      width: min(430px, 75vw);
      height: min(430px, 75vw);
      display: grid;
      place-items: center;
      margin-top: 24px;
    }

    .earth {
      position: relative;
      width: 86%;
      height: 86%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 28%, rgba(255,255,255,.55), transparent 18%),
        radial-gradient(circle at 65% 68%, #50bd7e 0 13%, transparent 14%),
        radial-gradient(circle at 32% 68%, #59bf71 0 11%, transparent 12%),
        radial-gradient(circle at 65% 32%, #58c47d 0 16%, transparent 17%),
        radial-gradient(circle at 42% 44%, #4fc77a 0 12%, transparent 13%),
        linear-gradient(145deg, #55c3ff, #118dc7 65%, #0a6ea5);
      box-shadow:
        inset -26px -34px 38px rgba(7, 64, 116, .24),
        inset 18px 18px 38px rgba(255, 255, 255, .35),
        0 26px 48px rgba(33, 122, 163, .28);
      transition: transform .25s ease, filter .25s ease;
      animation: gentleFloat 4s ease-in-out infinite;
    }

    .earth.happy { filter: saturate(1.12) brightness(1.02); }
    .earth.super { filter: saturate(1.25) brightness(1.1); }

    .face {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 3;
      pointer-events: none;
    }

    .eyes {
      position: absolute;
      top: 43%;
      width: 42%;
      display: flex;
      justify-content: space-between;
    }

    .eye {
      width: 26px;
      height: 31px;
      background: #16405c;
      border-radius: 50%;
      position: relative;
    }

    .eye::after {
      content: "";
      position: absolute;
      top: 5px;
      left: 7px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #fff;
    }

    .mouth {
      position: absolute;
      top: 58%;
      width: 96px;
      height: 46px;
      border-bottom: 10px solid #16405c;
      border-radius: 0 0 90px 90px;
    }

    .cheek {
      position: absolute;
      top: 53%;
      width: 44px;
      height: 22px;
      background: rgba(255, 123, 147, .55);
      border-radius: 50%;
      filter: blur(.2px);
    }
    .cheek.left { left: 21%; }
    .cheek.right { right: 21%; }

    .nature-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 4;
    }

    .nature-item {
      position: absolute;
      font-size: 30px;
      opacity: 0;
      transform: scale(.2) rotate(-12deg);
      transition: all .5s ease;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,.15));
    }
    .nature-item.show { opacity: 1; transform: scale(1) rotate(0deg); }

    .rainbow {
      position: absolute;
      top: 18%;
      left: 50%;
      width: 230px;
      height: 115px;
      transform: translateX(-50%);
      border-radius: 230px 230px 0 0;
      background: conic-gradient(from 180deg at 50% 100%, #ef4444, #f97316, #facc15, #22c55e, #3b82f6, #6366f1, #a855f7, transparent 0);
      mask: radial-gradient(circle at 50% 100%, transparent 0 44%, #000 45% 62%, transparent 63%);
      opacity: 0;
      transition: opacity .6s ease;
      z-index: -1;
    }
    .rainbow.show { opacity: .9; }

    .message {
      margin-top: 22px;
      background: #fff;
      border-radius: 24px;
      padding: 14px 18px;
      font-size: 23px;
      font-weight: 900;
      color: #248160;
      box-shadow: 0 8px 18px rgba(0,0,0,.08);
      min-height: 62px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      max-width: 92%;
    }

    .panel {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 620px;
    }

    .panel h2 {
      margin: 0 0 8px;
      font-size: 24px;
      color: #15536a;
    }

    .gem-list {
      display: grid;
      gap: 10px;
      max-height: 330px;
      overflow: auto;
      padding-right: 4px;
    }

    .gem-btn {
      position: relative;
      border: 0;
      border-radius: 20px;
      padding: 14px 12px;
      text-align: left;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 9px 0 rgba(0,0,0,.12), 0 8px 18px rgba(0,0,0,.12);
      transition: transform .1s ease, box-shadow .1s ease;
      min-height: 74px;
    }
    .gem-btn:active {
      transform: translateY(6px);
      box-shadow: 0 3px 0 rgba(0,0,0,.12), 0 4px 10px rgba(0,0,0,.1);
    }

    .gem-title {
      font-size: 23px;
      font-weight: 1000;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .gem-desc {
      margin-top: 4px;
      font-size: 14px;
      font-weight: 700;
      opacity: .95;
      line-height: 1.25;
    }

    .tools {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .small-btn, .primary-btn {
      border: 0;
      border-radius: 16px;
      padding: 12px;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 6px 12px rgba(0,0,0,.08);
    }

    .primary-btn {
      background: #267fa5;
      color: #fff;
    }

    .small-btn {
      background: #fff;
      color: #275267;
    }

    .form {
      background: rgba(255,255,255,.8);
      border-radius: 22px;
      padding: 14px;
      display: none;
      gap: 10px;
      border: 2px dashed rgba(38, 127, 165, .3);
    }
    .form.show { display: grid; }

    label {
      font-size: 14px;
      font-weight: 900;
      color: #31556b;
    }

    input, textarea, select {
      width: 100%;
      border: 2px solid #cfe4ee;
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 16px;
      font-family: inherit;
      background: #fff;
    }

    textarea { resize: vertical; min-height: 60px; }

    .color-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .color-option {
      border: 3px solid transparent;
      height: 38px;
      border-radius: 14px;
      cursor: pointer;
      box-shadow: inset 0 -5px 0 rgba(0,0,0,.1);
    }
    .color-option.selected {
      border-color: #17384a;
      outline: 3px solid rgba(255,255,255,.9);
    }

    .stats {
      background: rgba(255,255,255,.72);
      border-radius: 20px;
      padding: 12px;
      font-size: 15px;
      line-height: 1.5;
      max-height: 150px;
      overflow: auto;
    }

    .flying-gem {
      position: fixed;
      z-index: 9999;
      font-size: 48px;
      pointer-events: none;
      transition: all .75s cubic-bezier(.2, .9, .2, 1.05);
      filter: drop-shadow(0 8px 10px rgba(0,0,0,.2));
    }

    .sparkle {
      position: fixed;
      z-index: 10000;
      pointer-events: none;
      animation: pop .75s ease-out forwards;
      font-size: 30px;
    }

    @keyframes pop {
      from { transform: scale(.2); opacity: 1; }
      to { transform: scale(1.8) translateY(-24px); opacity: 0; }
    }

    @keyframes gentleFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .earth.bump {
      animation: bump .55s ease;
    }

    @keyframes bump {
      0% { transform: scale(1); }
      35% { transform: scale(1.08); }
      70% { transform: scale(.98); }
      100% { transform: scale(1); }
    }

    @media (max-width: 900px) {
      header { flex-direction: column; align-items: stretch; }
      .main { grid-template-columns: 1fr; }
      .earth-card { min-height: 520px; }
      .panel { min-height: auto; }
      .score, .level { position: static; margin: 4px; display: inline-flex; align-self: flex-start; }
      .earth-wrap { margin-top: 8px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>🌍 마음보석으로 지구를 빛내요</h1>
      <div class="challenge-box">
        <div class="challenge-label">현재 챌린지</div>
        <div id="challengeTitle">💧 물보석 챌린지</div>
      </div>
    </header>

    <main class="main">
      <section class="earth-card">
        <div class="score" id="scoreText">0점</div>
        <div class="level" id="levelText">씨앗 지구</div>

        <div class="earth-wrap" id="earthTarget">
          <div class="rainbow" id="rainbow"></div>
          <div class="earth" id="earth">
            <div class="face">
              <div class="eyes">
                <div class="eye"></div>
                <div class="eye"></div>
              </div>
              <div class="cheek left"></div>
              <div class="cheek right"></div>
              <div class="mouth"></div>
            </div>
          </div>
          <div class="nature-layer">
            <span class="nature-item" id="flower1" style="left:16%; bottom:8%;">🌸</span>
            <span class="nature-item" id="flower2" style="right:15%; bottom:10%;">🌼</span>
            <span class="nature-item" id="tree1" style="left:8%; top:45%;">🌳</span>
            <span class="nature-item" id="tree2" style="right:6%; top:48%;">🌲</span>
            <span class="nature-item" id="bird1" style="left:14%; top:15%;">🐦</span>
            <span class="nature-item" id="bird2" style="right:13%; top:18%;">🦋</span>
            <span class="nature-item" id="star1" style="left:45%; bottom:2%;">✨</span>
          </div>
        </div>

        <div class="message" id="message">보석을 눌러 지구에게 보내요!</div>
      </section>

      <aside class="panel">
        <div>
          <h2>💎 마음보석</h2>
          <div class="gem-list" id="gemList"></div>
        </div>

        <div class="tools">
          <button class="primary-btn" id="toggleFormBtn">+ 보석 추가</button>
          <button class="small-btn" id="editChallengeBtn">챌린지 바꾸기</button>
          <button class="small-btn" id="undoBtn">↩ 10점 취소</button>
          <button class="small-btn" id="resetBtn">처음으로</button>
        </div>

        <div class="form" id="gemForm">
          <label>보석 이름</label>
          <input id="gemName" placeholder="예: 협력보석" />

          <label>보석 설명</label>
          <textarea id="gemDesc" placeholder="예: 친구와 함께 지구를 지키는 마음"></textarea>

          <label>보석 색깔</label>
          <div class="color-grid" id="colorGrid"></div>

          <button class="primary-btn" id="saveGemBtn">보석 저장</button>
        </div>

        <div>
          <h2>📊 보석 기록</h2>
          <div class="stats" id="statsBox"></div>
        </div>
      </aside>
    </main>
  </div>

  <script>
    const rainbowColors = [
      { name: "빨강", value: "#ef4444" },
      { name: "주황", value: "#f97316" },
      { name: "노랑", value: "#eab308" },
      { name: "초록", value: "#22c55e" },
      { name: "파랑", value: "#3b82f6" },
      { name: "남색", value: "#3730a3" },
      { name: "보라", value: "#a855f7" }
    ];

    const defaultGems = [
      { id: crypto.randomUUID(), name: "절제보석", desc: "필요한 만큼만 아껴 쓰는 마음", color: "#3b82f6", count: 0 },
      { id: crypto.randomUUID(), name: "배려보석", desc: "지구와 생명을 생각하는 마음", color: "#a855f7", count: 0 },
      { id: crypto.randomUUID(), name: "책임보석", desc: "내가 한 일을 끝까지 지키는 마음", color: "#22c55e", count: 0 },
      { id: crypto.randomUUID(), name: "협력보석", desc: "친구와 함께 지구를 지키는 마음", color: "#eab308", count: 0 }
    ];

    const state = JSON.parse(localStorage.getItem("earthGemStateV1") || "null") || {
      score: 0,
      challenge: "💧 물보석 챌린지",
      gems: defaultGems,
      history: []
    };

    let selectedColor = rainbowColors[4].value;

    const gemList = document.getElementById("gemList");
    const scoreText = document.getElementById("scoreText");
    const levelText = document.getElementById("levelText");
    const message = document.getElementById("message");
    const earth = document.getElementById("earth");
    const earthTarget = document.getElementById("earthTarget");
    const statsBox = document.getElementById("statsBox");
    const challengeTitle = document.getElementById("challengeTitle");
    const gemForm = document.getElementById("gemForm");

    function save() {
      localStorage.setItem("earthGemStateV1", JSON.stringify(state));
    }

    function levelInfo(score) {
      if (score >= 1000) return ["행복한 지구 완성", "고마워! 지구가 반짝반짝 빛나요!"];
      if (score >= 700) return ["무지개 지구", "무지개가 떴어요!"];
      if (score >= 500) return ["숲이 자라는 지구", "나무가 자라고 있어요!"];
      if (score >= 300) return ["꽃이 피는 지구", "꽃이 피었어요!"];
      if (score >= 100) return ["웃는 지구", "지구가 웃고 있어요!"];
      return ["씨앗 지구", "보석을 눌러 지구에게 보내요!"];
    }

    function updateEarth() {
      scoreText.textContent = `${state.score}점`;
      const [level, msg] = levelInfo(state.score);
      levelText.textContent = level;
      challengeTitle.textContent = state.challenge;

      document.getElementById("flower1").classList.toggle("show", state.score >= 300);
      document.getElementById("flower2").classList.toggle("show", state.score >= 300);
      document.getElementById("tree1").classList.toggle("show", state.score >= 500);
      document.getElementById("tree2").classList.toggle("show", state.score >= 500);
      document.getElementById("rainbow").classList.toggle("show", state.score >= 700);
      document.getElementById("bird1").classList.toggle("show", state.score >= 700);
      document.getElementById("bird2").classList.toggle("show", state.score >= 700);
      document.getElementById("star1").classList.toggle("show", state.score >= 1000);
      earth.classList.toggle("happy", state.score >= 100);
      earth.classList.toggle("super", state.score >= 700);

      if (!message.dataset.manual) message.textContent = msg;
    }

    function renderGems() {
      gemList.innerHTML = "";
      state.gems.forEach(gem => {
        const btn = document.createElement("button");
        btn.className = "gem-btn";
        btn.style.background = `linear-gradient(145deg, ${gem.color}, ${shade(gem.color, -25)})`;
        btn.innerHTML = `
          <div class="gem-title">💎 ${escapeHtml(gem.name)}</div>
          <div class="gem-desc">${escapeHtml(gem.desc || "마음보석을 빛내요.")}</div>
        `;
        btn.addEventListener("click", (e) => addGemScore(gem, btn));
        gemList.appendChild(btn);
      });
    }

    function renderStats() {
      const totalGems = state.gems.reduce((sum, g) => sum + (g.count || 0), 0);
      const lines = state.gems
        .map(g => `💎 ${escapeHtml(g.name)}: ${g.count || 0}개 (${(g.count || 0) * 10}점)`)
        .join("<br>");
      statsBox.innerHTML = `
        전체 보석: <b>${totalGems}개</b><br>
        전체 점수: <b>${state.score}점</b><hr>
        ${lines || "아직 보석이 없어요."}
      `;
    }

    function renderColors() {
      const colorGrid = document.getElementById("colorGrid");
      colorGrid.innerHTML = "";
      rainbowColors.forEach(c => {
        const div = document.createElement("button");
        div.type = "button";
        div.className = "color-option";
        div.title = c.name;
        div.style.background = c.value;
        div.classList.toggle("selected", c.value === selectedColor);
        div.addEventListener("click", () => {
          selectedColor = c.value;
          renderColors();
        });
        colorGrid.appendChild(div);
      });
    }

    function addGemScore(gem, sourceEl) {
      state.score += 10;
      gem.count = (gem.count || 0) + 1;
      state.history.push({ gemId: gem.id, points: 10, time: Date.now() });
      save();

      flyGem(sourceEl, gem.color);
      earth.classList.remove("bump");
      void earth.offsetWidth;
      earth.classList.add("bump");

      message.dataset.manual = "true";
      message.textContent = `${gem.name}을 지구에게 보냈어요! +10점`;
      setTimeout(() => {
        delete message.dataset.manual;
        updateEarth();
      }, 1800);

      render();
    }

    function flyGem(sourceEl, color) {
      const source = sourceEl.getBoundingClientRect();
      const target = earthTarget.getBoundingClientRect();
      const gem = document.createElement("div");
      gem.className = "flying-gem";
      gem.textContent = "💎";
      gem.style.left = `${source.left + source.width / 2}px`;
      gem.style.top = `${source.top + source.height / 2}px`;
      gem.style.color = color;
      document.body.appendChild(gem);

      requestAnimationFrame(() => {
        gem.style.left = `${target.left + target.width / 2 - 20}px`;
        gem.style.top = `${target.top + target.height / 2 - 20}px`;
        gem.style.transform = "scale(1.5) rotate(360deg)";
        gem.style.opacity = "0.9";
      });

      setTimeout(() => {
        makeSparkles(target.left + target.width/2, target.top + target.height/2);
        gem.remove();
      }, 760);
    }

    function makeSparkles(x, y) {
      for (let i = 0; i < 8; i++) {
        const sp = document.createElement("div");
        sp.className = "sparkle";
        sp.textContent = ["✨","⭐","💫"][i % 3];
        sp.style.left = `${x + (Math.random()*120 - 60)}px`;
        sp.style.top = `${y + (Math.random()*120 - 60)}px`;
        document.body.appendChild(sp);
        setTimeout(() => sp.remove(), 800);
      }
    }

    function addNewGem() {
      const name = document.getElementById("gemName").value.trim();
      const desc = document.getElementById("gemDesc").value.trim();
      if (!name) {
        alert("보석 이름을 적어주세요.");
        return;
      }
      state.gems.push({
        id: crypto.randomUUID(),
        name,
        desc,
        color: selectedColor,
        count: 0
      });
      document.getElementById("gemName").value = "";
      document.getElementById("gemDesc").value = "";
      gemForm.classList.remove("show");
      save();
      render();
    }

    function changeChallenge() {
      const next = prompt("챌린지 이름을 입력하세요.", state.challenge);
      if (next && next.trim()) {
        state.challenge = next.trim();
        save();
        render();
      }
    }

    function undo() {
      const last = state.history.pop();
      if (!last) return;
      state.score = Math.max(0, state.score - last.points);
      const gem = state.gems.find(g => g.id === last.gemId);
      if (gem) gem.count = Math.max(0, (gem.count || 0) - 1);
      save();
      render();
    }

    function resetAll() {
      if (!confirm("점수와 보석 기록을 처음으로 돌릴까요? 보석 목록은 유지됩니다.")) return;
      state.score = 0;
      state.history = [];
      state.gems.forEach(g => g.count = 0);
      save();
      render();
    }

    function render() {
      renderGems();
      renderStats();
      updateEarth();
    }

    function shade(hex, percent) {
      const num = parseInt(hex.replace("#",""), 16);
      const amt = Math.round(2.55 * percent);
      const R = (num >> 16) + amt;
      const G = (num >> 8 & 0x00FF) + amt;
      const B = (num & 0x0000FF) + amt;
      return "#" + (0x1000000 +
        (R<255?R<1?0:R:255)*0x10000 +
        (G<255?G<1?0:G:255)*0x100 +
        (B<255?B<1?0:B:255)
      ).toString(16).slice(1);
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, m => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
      }[m]));
    }

    document.getElementById("toggleFormBtn").addEventListener("click", () => {
      gemForm.classList.toggle("show");
    });
    document.getElementById("saveGemBtn").addEventListener("click", addNewGem);
    document.getElementById("editChallengeBtn").addEventListener("click", changeChallenge);
    document.getElementById("undoBtn").addEventListener("click", undo);
    document.getElementById("resetBtn").addEventListener("click", resetAll);

    renderColors();
    render();
  </script>
</body>
</html>
